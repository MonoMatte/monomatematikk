{% extends "base.html" %}
{% block title %}Mot AI – Konkurransemodus{% endblock %}
{% block body %}

<div class="container py-4" style="max-width:720px;">

    <!-- DIFFICULTY SELECTOR (shown before game starts) -->
    <div id="difficultyScreen" style="text-align:center;padding:60px 20px;">
        <div style="font-size:3rem;margin-bottom:12px;">🤖</div>
        <h2 style="font-weight:900;margin-bottom:8px;">Mot AI</h2>
        <p style="opacity:.6;margin-bottom:32px;">Velg vanskelighetsgrad</p>
        <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
            <button class="pvp-diff-btn" onclick="startMedVanskelighet('easy')">
                <div class="pvp-diff-icon">🟢</div>
                <div class="pvp-diff-name">Lett</div>
                <div class="pvp-diff-desc">AI er treg og gjør feil</div>
            </button>
            <button class="pvp-diff-btn" onclick="startMedVanskelighet('medium')">
                <div class="pvp-diff-icon">🟡</div>
                <div class="pvp-diff-name">Middels</div>
                <div class="pvp-diff-desc">AI er jevngod med deg</div>
            </button>
            <button class="pvp-diff-btn" onclick="startMedVanskelighet('hard')">
                <div class="pvp-diff-icon">🔴</div>
                <div class="pvp-diff-name">Vanskelig</div>
                <div class="pvp-diff-desc">AI er rask og sjelden feil</div>
            </button>
        </div>
        <a href="/pvp" style="display:block;margin-top:32px;opacity:.4;font-size:.9rem;">← Tilbake</a>
    </div>

    <!-- GAME (hidden until difficulty chosen) -->
    <div id="gameScreen" style="display:none;">

    <!-- HEADER -->
    <div class="pvp-game-header">
        <div class="pvp-player pvp-player-you">
            <div class="pvp-player-icon">🧑‍🎓</div>
            <div class="pvp-player-name">Du</div>
            <div class="pvp-score-val" id="scorePlayer">0</div>
        </div>

        <div class="pvp-middle">
            <div class="pvp-round-label">Runde <span id="roundNum">1</span> / 10</div>
            <div class="pvp-timer-ring">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="34" fill="none" stroke="#e0e0e0" stroke-width="6"/>
                    <circle id="timerArc" cx="40" cy="40" r="34" fill="none" stroke="#0d6efd"
                        stroke-width="6" stroke-linecap="round"
                        stroke-dasharray="213.6" stroke-dashoffset="0"
                        transform="rotate(-90 40 40)"/>
                </svg>
                <div class="pvp-timer-num" id="timerNum">30</div>
            </div>
            <div class="pvp-vs">VS</div>
        </div>

        <div class="pvp-player pvp-player-ai">
            <div class="pvp-player-icon">🤖</div>
            <div class="pvp-player-name">AI</div>
            <div id="aiDiffBadge" style="font-size:.7rem;opacity:.6;"></div>
            <div class="pvp-score-val" id="scoreAI">0</div>
        </div>
    </div>

    <!-- OPPGAVE-KORT -->
    <div class="pvp-question-card" id="questionCard">
        <div class="pvp-question-text" id="questionText">Laster oppgave...</div>

        <div class="pvp-status-row" id="statusRow" style="display:none;">
            <span id="statusMsg"></span>
        </div>

        <div class="pvp-input-row" id="inputRow">
            <input type="text" id="answerInput" class="pvp-answer-input" placeholder="Skriv svaret..." autocomplete="off">
            <button id="submitBtn" class="pvp-submit-btn" onclick="sjekkSvar()">Svar ➤</button>
        </div>

        <div class="pvp-ai-thinking" id="aiThinking">
            <span class="pvp-ai-dots">🤖 AI tenker<span id="dots"></span></span>
        </div>
    </div>

    <!-- NESTE-KNAPP -->
    <div class="text-center mt-3" id="nesteDiv" style="display:none;">
        <button class="pvp-neste-btn" onclick="nesteRunde()">Neste runde →</button>
    </div>

    <!-- RESULTAT -->
    <div class="pvp-result-screen" id="resultScreen" style="display:none;">
        <div id="resultIcon" style="font-size:4rem;"></div>
        <div id="resultTitle" style="font-size:2rem;font-weight:900;margin:12px 0;"></div>
        <div id="resultSub" style="opacity:.7;margin-bottom:24px;"></div>
        <div class="pvp-final-scores">
            <div class="pvp-final-you">🧑‍🎓 Du: <strong id="finalPlayer">0</strong></div>
            <div class="pvp-final-ai">🤖 AI: <strong id="finalAI">0</strong></div>
        </div>
        <a href="/pvp/mot-ai" class="pvp-neste-btn" style="margin-top:20px;display:inline-block;">Spill igjen 🔄</a>
        <a href="/pvp" style="display:block;margin-top:12px;opacity:.5;font-size:.9rem;">← Velg modus</a>
    </div>

    </div><!-- /gameScreen -->
</div>

<script>
const TOTAL_ROUNDS = 10;
const BASE_TIME = 30;
const CIRCUMFERENCE = 213.6;

let round = 0;
let scorePlayer = 0;
let scoreAI = 0;
let currentAnswer = "";
let timerVal = BASE_TIME;
let timerInterval = null;
let aiTimeout = null;
let roundDone = false;
let playerAnsweredAt = null;
let aiAnsweredAt = null;
let difficulty = 'medium';

/*
  AI-oppførsel per vanskelighetsgrad:
  - waitMin/waitMax: sekunder FRA voppretter vises til AI "svarer"
  - correctChance:   sannsynlighet (0-1) at AI svarer RIKTIG
  
  Lett:      AI venter 18-28s, svarer riktig 35% av tiden
  Middels:   AI venter  8-18s, svarer riktig 70% av tiden
  Vanskelig: AI venter  2-7s,  svarer riktig 92% av tiden
*/
const DIFF = {
    easy:   { waitMin: 18, waitMax: 28, correctChance: 0.35 },
    medium: { waitMin:  8, waitMax: 18, correctChance: 0.70 },
    hard:   { waitMin:  2, waitMax:  7, correctChance: 0.92 },
};

function startMedVanskelighet(d) {
    difficulty = d;
    document.getElementById('difficultyScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    const badges = { easy:'🟢 Lett', medium:'🟡 Middels', hard:'🔴 Vanskelig' };
    document.getElementById('aiDiffBadge').textContent = badges[d];
    startRunde();
}

function _rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

async function hentOppgave() {
    // Send difficulty til server så riktig oppgavepool brukes
    const res = await fetch('/pvp/ai-oppgave?diff=' + difficulty);
    return await res.json();
}

async function startRunde() {
    round++;
    if (round > TOTAL_ROUNDS) { visResultat(); return; }

    roundDone = false;
    playerAnsweredAt = null;
    aiAnsweredAt = null;

    document.getElementById('roundNum').textContent = round;
    document.getElementById('statusRow').style.display = 'none';
    document.getElementById('nesteDiv').style.display = 'none';
    document.getElementById('inputRow').style.display = 'flex';
    document.getElementById('aiThinking').style.display = 'block';
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').disabled = false;
    document.getElementById('answerInput').className = 'pvp-answer-input';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('questionCard').style.display = 'block';
    startDots();

    // Last oppgave fra server
    const oppgave = await hentOppgave();
    currentAnswer = oppgave.a;
    document.getElementById('questionText').textContent = oppgave.q;

    // Start timer og AI KUN etter at spørsmål er synlig
    startTimer();
    scheduleAI();
}

function scheduleAI() {
    clearTimeout(aiTimeout);
    const cfg = DIFF[difficulty];

    // Bestem nå om AI vil svare riktig denne runden
    const willBeCorrect = Math.random() < cfg.correctChance;

    // Trekk ventetid i sekunder
    const waitSec = _rand(cfg.waitMin, cfg.waitMax);

    aiTimeout = setTimeout(() => {
        if (roundDone) return;
        document.getElementById('aiThinking').style.display = 'none';

        if (willBeCorrect) {
            // AI svarer riktig
            aiAnsweredAt = timerVal;

            if (playerAnsweredAt !== null) {
                // Spiller var allerede ferdig — avslutt runden
                avsluttRunde();
            } else {
                // Spiller tenker fortsatt — vis melding, kutt timer
                showStatus('🤖 AI svarte riktig! Du har <strong>' + timerVal + 's</strong> igjen...', 'pvp-status-ai');
                if (timerVal > 8) timerVal = 8;
            }
        } else {
            // AI svarer feil — spiller får sjansen alene
            showStatus('🤖 AI svarte feil! Din sjanse ✨', 'pvp-status-win');
            // AI prøver ikke igjen — runden fortsetter til timeout eller spiller svarer
        }
    }, waitSec * 1000);
}

function showStatus(html, cls) {
    const row = document.getElementById('statusRow');
    row.style.display = 'flex';
    row.className = 'pvp-status-row ' + cls;
    document.getElementById('statusMsg').innerHTML = html;
}

function startTimer() {
    clearInterval(timerInterval);
    timerVal = BASE_TIME;
    updateTimerUI();
    timerInterval = setInterval(() => {
        timerVal--;
        updateTimerUI();
        if (timerVal <= 0) {
            clearInterval(timerInterval);
            if (!roundDone) avsluttRunde();
        }
    }, 1000);
}

function updateTimerUI() {
    document.getElementById('timerNum').textContent = timerVal;
    const arc = document.getElementById('timerArc');
    arc.style.strokeDashoffset = CIRCUMFERENCE * (1 - timerVal / BASE_TIME);
    arc.style.stroke = timerVal <= 10 ? '#dc3545' : timerVal <= 20 ? '#fd7e14' : '#0d6efd';
}

function sjekkSvar() {
    if (roundDone) return;
    const raw = document.getElementById('answerInput').value.trim();
    if (!raw) return;

    const input = document.getElementById('answerInput');
    const normalize = s => s.replace(',', '.').toLowerCase().trim();

    if (normalize(raw) === normalize(currentAnswer)) {
        playerAnsweredAt = timerVal;
        input.disabled = true;
        document.getElementById('submitBtn').disabled = true;
        input.className = 'pvp-answer-input pvp-correct';

        if (aiAnsweredAt !== null) {
            // AI allerede riktig — avslutt
            avsluttRunde();
        } else {
            // Vent litt på AI — kutt timer
            if (timerVal > 8) timerVal = 8;
        }
    } else {
        input.className = 'pvp-answer-input pvp-wrong';
        setTimeout(() => {
            input.className = 'pvp-answer-input';
            input.value = '';
        }, 500);
    }
}

function avsluttRunde() {
    if (roundDone) return;
    roundDone = true;
    clearInterval(timerInterval);
    clearTimeout(aiTimeout);

    document.getElementById('inputRow').style.display = 'none';
    document.getElementById('aiThinking').style.display = 'none';

    const pOk = playerAnsweredAt !== null;
    const aOk = aiAnsweredAt !== null;
    let rp = 0, ra = 0;

    if (pOk && aOk) {
        if (playerAnsweredAt >= aiAnsweredAt) {
            rp = 100; ra = 40;
            showStatus('✅ Du var raskere! +100 &nbsp;|&nbsp; 🤖 +40', 'pvp-status-win');
        } else {
            rp = 40; ra = 100;
            showStatus('⚡ AI var raskere! +40 &nbsp;|&nbsp; 🤖 +100', 'pvp-status-lose');
        }
    } else if (pOk) {
        rp = 100;
        showStatus('✅ Bare du fikk det til! +100 poeng', 'pvp-status-win');
    } else if (aOk) {
        ra = 100;
        showStatus('❌ AI fikk det til, du ikke. 🤖 +100', 'pvp-status-lose');
    } else {
        showStatus('⏱️ Ingen svarte riktig denne runden!', 'pvp-status-draw');
    }

    scorePlayer += rp;
    scoreAI += ra;
    document.getElementById('scorePlayer').textContent = scorePlayer;
    document.getElementById('scoreAI').textContent = scoreAI;
    document.getElementById('nesteDiv').style.display = 'block';
}

function nesteRunde() {
    if (round >= TOTAL_ROUNDS) { visResultat(); return; }
    startRunde();
}

function visResultat() {
    document.getElementById('questionCard').style.display = 'none';
    document.getElementById('nesteDiv').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('finalPlayer').textContent = scorePlayer;
    document.getElementById('finalAI').textContent = scoreAI;

    if (scorePlayer > scoreAI) {
        document.getElementById('resultIcon').textContent = '🏆';
        document.getElementById('resultTitle').textContent = 'Du vant!';
    } else if (scoreAI > scorePlayer) {
        document.getElementById('resultIcon').textContent = '🤖';
        document.getElementById('resultTitle').textContent = 'AI vant!';
    } else {
        document.getElementById('resultIcon').textContent = '🤝';
        document.getElementById('resultTitle').textContent = 'Uavgjort!';
    }
    document.getElementById('resultSub').textContent = scorePlayer + ' – ' + scoreAI + ' poeng';
}

let dotsInterval = null;
function startDots() {
    clearInterval(dotsInterval);
    let d = 0;
    const el = document.getElementById('dots');
    dotsInterval = setInterval(() => {
        if (el) el.textContent = '.'.repeat((d++ % 3) + 1);
    }, 400);
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('answerInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') sjekkSvar();
    });
});
</script>

{% endblock %}
